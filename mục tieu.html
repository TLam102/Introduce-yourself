	<style>
html {
    overflow-y: scroll;
}
body{
    font-family: Arial, sans-serif;
    background-color: #FFF6ED;
    margin:0;
    padding:40px;
}

/* Khung mục tiêu */
.goal-box{
    background:#fff;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    padding:20px;
    max-width:900px;
    margin:auto;
}

/* Tiêu đề */
.goal-header{
    cursor:pointer;
    font-size:20px;
    font-weight:500;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.goal-header span{
    color:red;
    font-weight:bold;
}

/* Nội dung ẩn */
.goal-content{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.4s ease;
    margin-top:15px;
}

.goal-content p{
    margin:10px 0;
    font-size:18px;
}

.arrow{
    transition:transform 0.3s ease;
}

/* Khi mở */
.goal-box.active .goal-content{
    max-height:400px;
}

.goal-box.active .arrow{
    transform:rotate(180deg);
}
</style>
</head>
